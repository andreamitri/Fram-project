    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Chat — Fram, home delivery from your local farms</title>
    <meta
      name="description"
      content="Chat with Fram and get answers about our produce, delivery and farms."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400&family=Arimo:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="chat-body">
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="nav" id="nav">
      <button
        class="nav__menu-btn"
        id="menuBtn"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="navDrawer"
      >
        <span class="bar" aria-hidden="true"></span>
        <span class="bar" aria-hidden="true"></span>
        <span class="bar" aria-hidden="true"></span>
      </button>
      <a href="index.html" class="nav__logo" aria-label="Fram — go to homepage"
        >FRAM</a
      >
      <a
        href="products.html"
        class="nav__basket"
        id="basketBtn"
        aria-label="Basket, 0 items"
      >
        <span id="basketCount" aria-hidden="true">0</span>
      </a>
    </header>

    <div
      class="drawer"
      id="navDrawer"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
      aria-label="Navigation menu"
    >
      <div class="drawer__overlay" id="drawerOverlay"></div>
      <nav class="drawer__panel" aria-label="Site navigation">
        <button
          class="drawer__close"
          id="drawerClose"
          aria-label="Close navigation menu"
        >
          ✕
        </button>
        <a href="index.html" class="drawer__link">HOME</a>
        <a href="products.html" class="drawer__link">PRODUCTS</a>
        <a href="chat.html" class="drawer__link" aria-current="page">CHAT</a>
        <a href="products.html" class="drawer__link drawer__link--checkout"
          >CHECKOUT</a
        >
      </nav>
    </div>

    <main
      id="main-content"
      tabindex="-1"
      class="chat-main"
      aria-labelledby="chat-heading"
    >
      <img
        src="pictures/header.jpg"
        alt=""
        class="chat-bg"
        role="presentation"
      />

      <div class="chat-card">
        <h1 id="chat-heading" class="sr-only">Chat with Fram</h1>

        <div
          class="chat-messages"
          id="chatMessages"
          role="log"
          aria-label="Chat messages"
          aria-live="polite"
          aria-relevant="additions"
        >
          <div class="chat-msg chat-msg--bot">
            <span class="chat-msg__sender" aria-hidden="true">FRAM</span>
            <p class="chat-msg__bubble chat-msg__bubble--bot">
              What can I help you with today?
            </p>
          </div>
        </div>

        <p class="chat-error" id="chatError" hidden role="alert">
          Failed to connect. Wait and try again later.
        </p>

        <div class="chat-input-row">
          <label for="chatInput" class="sr-only">Type your message</label>
          <input
            type="text"
            id="chatInput"
            class="chat-input"
            placeholder="Ask us anything…"
            autocomplete="off"
            aria-describedby="chatError"
          />
          <button class="chat-send" id="chatSend" aria-label="Send message">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <line x1="12" y1="19" x2="12" y2="5" />
              <polyline points="5 12 12 5 19 12" />
            </svg>
          </button>
        </div>
      </div>
    </main>

    <div
      id="toast"
      class="toast"
      role="status"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <script src="main.js"></script>
  </body>
</html>
